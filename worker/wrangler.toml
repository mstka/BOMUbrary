# Cloudflare Worker 設定（BOMUbrary discord-proxy）
# デプロイ: cd worker && npx wrangler deploy
#
# シークレットは wrangler secret put で登録する（下記コマンド参照）。
# 非機密の DISCORD_APP_ID / GAS_EXEC_URL は [vars] に置いてもよい。

name = "bomu-discord-proxy"
main = "discord-proxy.js"
compatibility_date = "2024-09-23"

# 例: 非機密値は vars に置ける（機密は secret put 推奨）
# [vars]
# DISCORD_APP_ID = "1175058274513600542"
# GAS_EXEC_URL = "https://script.google.com/macros/s/XXXX/exec"

# シークレット登録（デプロイ後に実行）:
#   npx wrangler secret put DISCORD_PUBLIC_KEY
#   npx wrangler secret put DISCORD_APP_ID
#   npx wrangler secret put GAS_EXEC_URL
#   npx wrangler secret put PROXY_SECRET
