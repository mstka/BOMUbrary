<script type="text/babel">
// ═══════════════════════════════════════════════════════════════
//  共通コンポーネント（Components.html）
// ═══════════════════════════════════════════════════════════════

// ─── Lucide アイコン ─────────────────────────────────────────────
function Icon({ name, size = 18, className = '' }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide && window.lucide.createIcons) {
      ref.current.innerHTML = '<i data-lucide="' + name + '"></i>';
      try {
        window.lucide.createIcons({ attrs: { width: size, height: size } });
      } catch (e) {}
    }
  }, [name, size]);
  return <span ref={ref} className={'inline-flex items-center ' + className}></span>;
}

// ─── Spinner ─────────────────────────────────────────────────────
function Spinner({ size = 20 }) {
  return (
    <span className="inline-block spin border-2 border-brand-500 border-t-transparent rounded-full"
      style={{ width: size, height: size }} />
  );
}

function LoadingScreen() {
  return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-3 text-brand-900">
      <Spinner size={32} />
      <p className="text-sm text-gray-500">読み込み中...</p>
    </div>
  );
}

// ─── Button ──────────────────────────────────────────────────────
function Button({ variant = 'primary', children, className = '', loading, disabled, ...props }) {
  const base = 'inline-flex items-center justify-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed';
  const variants = {
    primary:   'bg-brand-500 text-white hover:bg-brand-600 shadow-sm',
    secondary: 'bg-white text-brand-600 border border-brand-100 hover:bg-brand-50',
    danger:    'bg-red-500 text-white hover:bg-red-600',
    ghost:     'text-gray-600 hover:bg-gray-100',
  };
  return (
    <button className={base + ' ' + (variants[variant] || variants.primary) + ' ' + className}
      disabled={disabled || loading} {...props}>
      {loading && <Spinner size={14} />}
      {children}
    </button>
  );
}

// ─── Card ────────────────────────────────────────────────────────
function Card({ children, className = '', onClick }) {
  return (
    <div onClick={onClick}
      className={'bg-white rounded-2xl border border-gray-100 shadow-sm ' +
        (onClick ? 'cursor-pointer hover:shadow-md transition ' : '') + className}>
      {children}
    </div>
  );
}

// ─── Badge / Pill ────────────────────────────────────────────────
function Pill({ children, color = 'gray', className = '' }) {
  const colors = {
    gray:   'bg-gray-100 text-gray-700',
    brand:  'bg-brand-100 text-brand-600',
    green:  'bg-green-100 text-green-700',
    red:    'bg-red-100 text-red-700',
    yellow: 'bg-yellow-100 text-yellow-700',
  };
  return (
    <span className={'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' +
      (colors[color] || colors.gray) + ' ' + className}>
      {children}
    </span>
  );
}

function StatusPill({ status }) {
  const map = {
    available:   ['空き', 'green'],
    lending:     ['貸出中', 'yellow'],
    unavailable: ['利用不可', 'gray'],
  };
  const [label, color] = map[status] || [status, 'gray'];
  return <Pill color={color}>{label}</Pill>;
}

// ─── Avatar ──────────────────────────────────────────────────────
function Avatar({ url, name = '', size = 32 }) {
  const initial = (name || '?').trim().charAt(0).toUpperCase();
  if (url) {
    return <img src={url} alt={name} className="rounded-full object-cover"
      style={{ width: size, height: size }} />;
  }
  return (
    <span className="rounded-full bg-brand-100 text-brand-600 inline-flex items-center justify-center font-semibold"
      style={{ width: size, height: size, fontSize: size * 0.45 }}>
      {initial}
    </span>
  );
}

// ─── StarRating ──────────────────────────────────────────────────
function StarRating({ value = 0, onChange, size = 20, readOnly = false }) {
  const [hover, setHover] = React.useState(0);
  return (
    <span className="inline-flex gap-0.5">
      {[1, 2, 3, 4, 5].map((n) => (
        <button key={n} type="button" disabled={readOnly}
          onMouseEnter={() => !readOnly && setHover(n)}
          onMouseLeave={() => !readOnly && setHover(0)}
          onClick={() => !readOnly && onChange && onChange(n)}
          className={(readOnly ? '' : 'cursor-pointer ') + 'leading-none'}
          style={{ color: (hover || value) >= n ? '#f5b301' : '#d1d5db', fontSize: size }}>
          ★
        </button>
      ))}
    </span>
  );
}

// ─── Toast ───────────────────────────────────────────────────────
function Toast({ toast }) {
  const colors = {
    success: 'bg-green-600',
    error:   'bg-red-600',
    info:    'bg-brand-600',
  };
  return (
    <div className={'fixed bottom-6 left-1/2 -translate-x-1/2 z-50 toast-in text-white px-5 py-3 rounded-xl shadow-lg text-sm ' +
      (colors[toast.type] || colors.info)}>
      {toast.msg}
    </div>
  );
}

// ─── Modal ───────────────────────────────────────────────────────
function Modal({ open, onClose, title, children, footer, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4 fade-in">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />
      <div className={'relative bg-white rounded-2xl shadow-xl w-full ' + (wide ? 'max-w-2xl' : 'max-w-md') + ' max-h-[90vh] flex flex-col'}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <h3 className="font-semibold text-lg">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icon name="x" /></button>
        </div>
        <div className="px-5 py-4 overflow-y-auto">{children}</div>
        {footer && <div className="px-5 py-3 border-t border-gray-100 flex justify-end gap-2">{footer}</div>}
      </div>
    </div>
  );
}

// ─── SearchBar ───────────────────────────────────────────────────
function SearchBar({ value, onChange, placeholder = '検索...' }) {
  return (
    <div className="relative flex-1">
      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon name="search" size={16} /></span>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className="w-full pl-9 pr-3 py-2 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-brand-100 focus:border-brand-500" />
    </div>
  );
}

// ─── TagSelector ─────────────────────────────────────────────────
function TagSelector({ allTags, selected, onChange, onCreate }) {
  const [input, setInput] = React.useState('');
  const toggle = (tagId) => {
    if (selected.includes(tagId)) onChange(selected.filter((t) => t !== tagId));
    else onChange([...selected, tagId]);
  };
  const handleCreate = async () => {
    const name = input.trim();
    if (!name) return;
    const tagId = await onCreate(name);
    setInput('');
    if (tagId && !selected.includes(tagId)) onChange([...selected, tagId]);
  };
  return (
    <div>
      <div className="flex flex-wrap gap-1.5 mb-2">
        {allTags.map((t) => (
          <button key={t.tag_id} type="button" onClick={() => toggle(t.tag_id)}
            className={'px-2.5 py-1 rounded-full text-xs font-medium border transition ' +
              (selected.includes(t.tag_id)
                ? 'bg-brand-500 text-white border-brand-500'
                : 'bg-white text-gray-600 border-gray-200 hover:border-brand-300')}>
            {t.name}
          </button>
        ))}
      </div>
      <div className="flex gap-2">
        <input value={input} onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); handleCreate(); } }}
          placeholder="新しいタグを追加"
          className="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-brand-500" />
        <Button variant="secondary" type="button" onClick={handleCreate}>追加</Button>
      </div>
    </div>
  );
}

// ─── EmptyState ──────────────────────────────────────────────────
function EmptyState({ icon = 'inbox', title, hint }) {
  return (
    <div className="flex flex-col items-center justify-center py-16 text-center text-gray-400">
      <div className="mb-3 text-gray-300"><Icon name={icon} size={48} /></div>
      <p className="font-medium text-gray-500">{title}</p>
      {hint && <p className="text-sm mt-1">{hint}</p>}
    </div>
  );
}

// ─── BookCover ───────────────────────────────────────────────────
function BookCover({ url, title, className = '' }) {
  const [err, setErr] = React.useState(false);
  // NDLサムネイルはCloudFrontでホットリンク403になるため描画しない（旧データ保険）
  const bad = url && url.indexOf('ndlsearch.ndl.go.jp/thumbnail') >= 0;
  if (url && !err && !bad) {
    return <img src={url} alt={title} onError={() => setErr(true)}
      className={'cover-ratio object-cover w-full rounded-lg bg-gray-100 ' + className} />;
  }
  return (
    <div className={'cover-ratio w-full rounded-lg bg-gradient-to-br from-brand-100 to-brand-50 flex items-center justify-center p-2 ' + className}>
      <span className="text-brand-600 text-xs font-medium text-center line-clamp-4">{title}</span>
    </div>
  );
}

// ─── 画像を縮小して dataURL(JPEG) に変換（アップロード軽量化） ──
function resizeImageToDataUrl(file, maxW) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像を解析できませんでした'));
      img.onload = () => {
        const scale = Math.min(1, maxW / (img.width || maxW));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── CoverUploader（撮影/選択→Driveへアップロード→URL反映） ─────
function CoverUploader({ value, onChange }) {
  const { showToast } = useApp();
  const [busy, setBusy] = React.useState(false);
  const inputRef = React.useRef(null);

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setBusy(true);
    try {
      const dataUrl = await resizeImageToDataUrl(file, 800);
      const r = await gasCall('uploadCover', { dataUrl: dataUrl, filename: file.name || 'cover.jpg' });
      onChange(r.url);
      showToast('表紙をアップロードしました');
    } catch (err) {
      showToast(err.message || 'アップロードに失敗しました', 'error');
    } finally {
      setBusy(false);
      if (inputRef.current) inputRef.current.value = '';
    }
  };

  return (
    <div className="flex items-center gap-3">
      <div className="w-16 shrink-0"><BookCover url={value} title="表紙" /></div>
      <div className="flex-1">
        <input ref={inputRef} type="file" accept="image/*" capture="environment"
          className="hidden" onChange={onFile} />
        <Button variant="secondary" type="button" onClick={() => inputRef.current && inputRef.current.click()} loading={busy}>
          <Icon name="camera" size={16} />撮影 / 画像を選ぶ
        </Button>
        {value && <Button variant="ghost" type="button" onClick={() => onChange('')} className="ml-1">クリア</Button>}
        <p className="text-xs text-gray-400 mt-1">スマホならカメラが起動します。アップロード後、下のURL欄に反映されます。</p>
      </div>
    </div>
  );
}

// ─── BarcodeButton（バーコードを撮影→ISBNをデコード） ───────────
// GASのiframeではライブカメラ(getUserMedia)が使えないことが多いため、
// 撮影した1枚の画像から html5-qrcode でデコードする方式。
function BarcodeButton({ onDetected }) {
  const { showToast } = useApp();
  const [busy, setBusy] = React.useState(false);
  const ref = React.useRef(null);

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!window.Html5Qrcode) { showToast('スキャナの読み込みに失敗しました', 'error'); return; }
    setBusy(true);
    try {
      let host = document.getElementById('bc-scan-host');
      if (!host) {
        host = document.createElement('div');
        host.id = 'bc-scan-host';
        host.style.display = 'none';
        document.body.appendChild(host);
      }
      const formats = window.Html5QrcodeSupportedFormats
        ? [window.Html5QrcodeSupportedFormats.EAN_13, window.Html5QrcodeSupportedFormats.EAN_8]
        : undefined;
      const h5 = new window.Html5Qrcode('bc-scan-host', formats ? { formatsToSupport: formats } : undefined);
      const decoded = await h5.scanFile(file, false);
      try { await h5.clear(); } catch (e) {}
      const isbn = String(decoded).replace(/[^0-9]/g, '');
      if (!/^(978|979)\d{10}$/.test(isbn)) {
        showToast('書籍バーコード（978/979で始まる方）を読み取れませんでした', 'error');
        return;
      }
      onDetected(isbn);
    } catch (err) {
      showToast('バーコードを認識できませんでした。明るくピントを合わせて撮り直してください', 'error');
    } finally {
      setBusy(false);
      if (ref.current) ref.current.value = '';
    }
  };

  return (
    <>
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={onFile} />
      <Button variant="secondary" type="button" onClick={() => ref.current && ref.current.click()} loading={busy}>
        <Icon name="scan-line" size={16} />バーコード
      </Button>
    </>
  );
}

// ─── Field（フォーム用ラベル付き入力） ──────────────────────────
function Field({ label, required, children }) {
  return (
    <label className="block mb-3">
      <span className="block text-sm font-medium text-gray-700 mb-1">
        {label}{required && <span className="text-red-500 ml-0.5">*</span>}
      </span>
      {children}
    </label>
  );
}

function TextInput(props) {
  return <input {...props}
    className={'w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-100 focus:border-brand-500 ' + (props.className || '')} />;
}

function TextArea(props) {
  return <textarea {...props}
    className={'w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-100 focus:border-brand-500 ' + (props.className || '')} />;
}
</script>
